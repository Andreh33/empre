name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build (sin secretos reales: usa env de CI)
        env:
          TURSO_DATABASE_URL: libsql://ci.example.com
          TURSO_AUTH_TOKEN: ci
          ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          SEARCH_HMAC_KEY: BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB=
          NEXTAUTH_SECRET: 0123456789abcdef0123456789abcdef0123456789ab
          NEXTAUTH_URL: http://localhost:3000
          APP_URL: http://localhost:3000
        run: npm run build
